<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="根据您的原始密码生成不同的场景下的高强度密码">
    <meta name="key" content="密之,passwordz,password,密码管理,密码">
    <meta name="author" content="iaming">
    <title>密之 PasswordZ</title>
    <base >
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
    <link rel="icon" type="image/png" href="image/icon.png">
<style>.li{width:14px;height:14px;vertical-align:-2px;margin-right:5px;opacity:.85}</style>
</head>
<body>

<div class="container">
    <main>
        <div class="py-5 text-center">
            <a href="http://mi.zhitianxia.com"><img src="image/passwordz.png" height="85px" alt="密之 PasswordZ" title="密之 PasswordZ" /></a>
            <big>密之</big> · <small>PasswordZ</small>
            <p>
                根据原始密码生成不同场景下的高强度密码。算法开源，不会丢失；本地计算，不会泄露。
            </p>
            <p><a href="download.html">离线版程序下载</a></p>
        </div>

        <form>
            <div class="mb-3">
                <label for="originPassword" class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>原始密码</label>
                <input type="password" class="form-control" id="originPassword">
            </div>
            <div class="mb-3">
                <label for="sceneCode" class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></svg>场景代码</label>
                <input type="email" class="form-control" id="sceneCode" aria-describedby="sceneCodeHelp">
                <div id="sceneCodeHelp" class="form-text">场景或用途区分，方便您记忆关联</div>
            </div>
            <div class="mb-3 row">
                <div class="col-auto form-check form-switch ms-3">
                    <input type="checkbox" disabled checked=true class="form-check-input" role="switch" id="digitalCheck">
                    <label class="form-check-label" for="digitalCheck">数字</label>
                </div>
                <div class="col-auto form-check form-switch">
                    <input type="checkbox" class="form-check-input" role="switch" id="lowerCheck" checked=true>
                    <label class="form-check-label" for="lowerCheck">小写字母</label>
                </div>
                <div class="col-auto form-check form-switch">
                    <input type="checkbox" class="form-check-input" role="switch" id="upperCheck" checked=true>
                    <label class="form-check-label" for="upperCheck">大写字母</label>
                </div>
                <div class="col-auto form-check form-switch">
                    <input type="checkbox" class="form-check-input" role="switch" id="punctuationCheck" checked=true>
                    <label class="form-check-label" for="punctuationCheck">符号</label>
                </div>
            </div>
            <div class="mb-3 row">
                <div class="col-sm-12">
                    <button class="btn btn-primary" type="button" id="btn_generate">生成分发密码</button>
                </div>
            </div>
            <div class="mb-3">
                <label for="code" class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="15" r="4"/><path d="m10 12 8-8M16 6l2 2M13 9l2 2"/></svg>分发密码</label>
                <div class="input-group">
                  <input type="text" class="form-control" id="code" value="" readonly>
                  <button class="btn btn-outline-secondary" type="button" id="btn_copy" data-clipboard-target="#code"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span id="copyText">复制</span></button>
                </div>
            </div>
        </form>
    </main>

    <footer class="my-5 pt-5 text-muted text-center text-small">
        <ul class="list-inline">
            <li class="list-inline-item">简体中文</li>
            <li class="list-inline-item"><a href="en/index.html">English</a></li>
        </ul>

        </ul> -->
    </footer>
</div>
