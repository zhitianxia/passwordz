<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Generate strong passwords in different scenarios based on the original password">
    <meta name="keywords" content="passwordz,password,password manager,password generator">
    <meta name="author" content="iaming">
    <title>密之 PasswordZ</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/passwordz.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../image/favicon.svg">
    <link rel="icon" type="image/png" href="../image/icon.png">
</head>
<body>

<div class="container">
    <main>
        <div class="pz-hero">
            <div class="pz-hero-top">
                <a href="index.html"><img src="../image/passwordz.png" alt="密之 PasswordZ" title="密之 PasswordZ" /></a>
                <div class="pz-brand"><span class="pz-brand-cn">密之</span><span class="pz-brand-sep">·</span><span class="pz-brand-en">PasswordZ</span></div>
            </div>
            <p class="pz-slogan">Original password + scene → a strong password. <strong>Open algorithm, never lost; computed locally, never leaked.</strong></p>
            <p class="pz-hero-links"><a href="download.html">Offline download</a><span class="dot">·</span><a href="about.html">How it works</a></p>
        </div>

        <form class="pz-card" onsubmit="return false">
            <div class="mb-2">
                <label for="originPassword" class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Origin password</label>
                <input type="password" class="form-control" id="originPassword" autocomplete="off">
            </div>
            <div class="mb-2">
                <label for="sceneCode" class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></svg>Scene code</label>
                <input type="text" class="form-control" id="sceneCode" placeholder="e.g. icbc / gmail / office-wifi" autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="mb-2">
                <label class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Include</label>
                <div class="pz-charset">
                    <div class="form-check form-switch pz-locked" title="Required for security — digits always included">
                        <input type="checkbox" disabled checked class="form-check-input" role="switch" id="digitalCheck">
                        <label class="form-check-label" for="digitalCheck">Digit<svg class="li pz-lock-tip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></label>
                    </div>
                    <div class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" role="switch" id="lowerCheck" checked>
                        <label class="form-check-label" for="lowerCheck">Lower letter</label>
                    </div>
                    <div class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" role="switch" id="upperCheck" checked>
                        <label class="form-check-label" for="upperCheck">Upper letter</label>
                    </div>
                    <div class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" role="switch" id="punctuationCheck" checked>
                        <label class="form-check-label" for="punctuationCheck">Punctuation</label>
                    </div>
                </div>
            </div>
            <div class="mb-2">
                <button class="btn btn-primary w-100" type="button" id="btn_generate">Generate</button>
            </div>
            <div class="mb-0">
                <div class="pz-label-row">
                    <label class="form-label"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="15" r="4"/><path d="m10 12 8-8M16 6l2 2M13 9l2 2"/></svg>Password</label>
                    <span class="pz-strength" id="pzStrength" hidden>
                        <span class="pz-strength-bar"><span class="pz-strength-fill" id="pzStrengthFill"></span></span>
                        <span class="pz-strength-label" id="pzStrengthLabel"></span>
                    </span>
                </div>
                <div class="pz-result is-empty" id="pzResult">
                    <span class="pz-code" id="pzCode" aria-label="password"><span class="pz-code-ph">················</span></span>
                    <button class="btn btn-outline-secondary pz-copy" type="button" id="btn_copy"><svg class="li" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span id="copyText">copy</span></button>
                </div>
                <input type="text" id="code" class="pz-sr-only" readonly aria-hidden="true" tabindex="-1">
                <div class="pz-hint" id="pzHint" role="status" aria-live="polite"></div>
            </div>
        </form>
    </main>

    <footer class="my-4 pt-3 text-center pz-footer">
        <ul class="list-inline pz-lang">
            <li class="list-inline-item"><a href="../index.html">简体中文</a></li>
            <li class="list-inline-item active">English</li>
        </ul>
        <p class="mb-1">&copy; 2023-2026 <a href="http://mi.zhitianxia.com/">密之天下·PasswordZ</a> <a href="https://beian.miit.gov.cn/">浙ICP备15019268号-1</a> · <a href="http://www.fangmou.com">方谋</a></p>
    </footer>
</div>


<script type="text/javascript" src="../js/md5.min.js"></script>
<script type="text/javascript" src="../js/passwordz.js"></script>
<script type="text/javascript" src="../js/generator.js"></script>
<script type="text/javascript">
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?05af346252961380425c23d4f5b8ebfa";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
</script>
</body>
</html>
